<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous" />
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="bg-container py-5">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <h1 class="text-center text-white">Answer the Question</h1>
                    <div class="sub-container mt-3">
                        <form id="questionsForm">
                            <div class="p-3">
                                <h4>What is the capital of India?</h4>
                                <div class="pl-4">
                                    <div class="hydCity">
                                        <input name="one" id="cityHyderabad" type="radio" />
                                        <label for="cityHyderabad">Hyderabad</label>
                                    </div>

                                    <div>
                                        <input name="one" id="cityChennai" type="radio" />
                                        <label for="cityChennai">Chennai</label>
                                    </div>

                                    <div>
                                        <input name="one" id="cityDelhi" type="radio" />
                                        <label for="cityDelhi">Delhi</label>
                                    </div>

                                    <div>
                                        <input name="one" id="cityMumbai" type="radio" />
                                        <label for="cityMumbai">Kerla</label>
                                    </div>

                                    <div>
                                        <button type="submit" id="submitBtn" class="btn btn-primary mt-3">Submit</button>
                                        <p class="pt-3" id="resultMsg"></p>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>



                </div>
            </div>
        </div>



    </div>

<script src="JS.js"></script>
</body>

</html>
